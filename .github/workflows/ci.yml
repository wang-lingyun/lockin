name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Guard so CI is green before the app is scaffolded. Once apps/web exists
      # (Stage 0), the real checks run against the npm workspace.
      - name: Detect web app
        id: detect
        run: |
          if [ -f apps/web/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No apps/web yet — skipping lint/typecheck/test."
          fi

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.exists == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install (workspace root)
        if: steps.detect.outputs.exists == 'true'
        run: npm ci

      - name: Lint
        if: steps.detect.outputs.exists == 'true'
        run: npm run lint -w @lockin/web --if-present

      - name: Typecheck
        if: steps.detect.outputs.exists == 'true'
        run: npm run typecheck --workspaces --if-present

      - name: Test
        if: steps.detect.outputs.exists == 'true'
        run: npm run test -w @lockin/web --if-present

      - name: Build
        if: steps.detect.outputs.exists == 'true'
        run: npm run build -w @lockin/web
